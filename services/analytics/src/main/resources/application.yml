server:
  port: 8000

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/pulse}
    username: ${DB_USERNAME:pulse}
    password: ${DB_PASSWORD:pulse_dev}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
springdoc:
  swagger-ui:
    path: /docs

app:
  version: 1.0.0
