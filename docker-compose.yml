services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_dev
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: ./services/ingestion
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev@postgres:5432/pulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data:/app/data

  processing:
    build:
      context: ./services/processing
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev@postgres:5432/pulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics:
    build:
      context: ./services/analytics
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/pulse
      DB_USERNAME: pulse
      DB_PASSWORD: pulse_dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  issues:
    build:
      context: ./services/issues
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev@postgres:5432/pulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./services/gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev@postgres:5432/pulse
      REDIS_URL: redis://redis:6379/0
      INGESTION_SERVICE_URL: http://ingestion:8000
      PROCESSING_SERVICE_URL: http://processing:8000
      ANALYTICS_SERVICE_URL: http://analytics:8000
      ISSUES_SERVICE_URL: http://issues:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ingestion:
        condition: service_healthy
      processing:
        condition: service_healthy
      analytics:
        condition: service_healthy
      issues:
        condition: service_healthy
  frontend:
    build:
      context: ./services/frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
