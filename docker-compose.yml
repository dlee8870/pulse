services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_dev
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: ./services/ingestion
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev@postgres:5432/pulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  processing:
    build:
      context: ./services/processing
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev@postgres:5432/pulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics:
    build:
      context: ./services/analytics
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/pulse
      DB_USERNAME: pulse
      DB_PASSWORD: pulse_dev
    depends_on:
      postgres:
        condition: service_healthy

  issues:
    build:
      context: ./services/issues
    ports:
      - "8004:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_dev@postgres:5432/pulse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
